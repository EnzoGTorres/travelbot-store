name: Travelbot Scheduler

on:
  workflow_dispatch:
  schedule:
    - cron: "*/59 * * * *"

jobs:
  trigger-check:
    runs-on: ubuntu-latest
    steps:
      - name: Run Travelbot check
        run: |
          echo "Ejecutando check de Travelbot..."
          curl --fail --silent --show-error "${{ secrets.TRAVELBOT_CHECK_URL }}?secret=${{ secrets.TRAVELBOT_CHECK_SECRET }}"
